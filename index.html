<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS Fluid Wallpaper</title>
    <style>
        /* Сброс стандартных отступов */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Задаем пастельный градиент в стиле macOS */
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 50%, #fff3e0 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Холст для капель на весь экран */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <!-- Холст, на котором WebGL будет рисовать капли -->
    <canvas id="fluid-canvas"></canvas>

    <!-- Подключаем оптимизированную библиотеку симуляции жидкости -->
    <script src="https://jsdelivr.net"></script>
    
    <script>
        // Инициализируем симуляцию на нашем холсте
        const canvas = document.getElementById('fluid-canvas');
        
        // Настройки для получения пастельно-голубых капель
        window.webGLFluidSimulation.init(canvas, {
            IMMEDIATE: true,
            TRIGGER: 'hover',
            SIM_RESOLUTION: 128,
            DYE_RESOLUTION: 512,
            CAPTURE_ZOOM: 1.0,
            DENSITY_DISSIPATION: 1.2, // Как быстро капли растворяются и исчезают (чем больше, тем быстрее)
            VELOCITY_DISSIPATION: 0.98, // Насколько лениво капли отпадают от мыши
            PRESSURE: 0.8, // Взаимодействие капель друг с другом
            PRESSURE_ITERATIONS: 20,
            CURL: 5, // Завихрения жидкости при движении
            SPLAT_RADIUS: 0.25, // Размер капли при клике/движении
            SPLAT_FORCE: 6000,
            SHADING: true, // Объемный 3D эффект для жидкости
            COLORFUL: false, // Отключаем случайные цвета, чтобы задать свои
            COLOR_PALETTE: ['#90caf9', '#64b5f6', '#bbdefb', '#e3f2fd'], // Палитра пастельно-голубых оттенков
            PAUSED: false,
            BACK_COLOR: { r: 0, g: 0, b: 0, a: 0 }, // Прозрачный фон, чтобы был виден наш CSS градиент
            BLOOM: true, // Эффект мягкого свечения капель
            BLOOM_ITERATIONS: 8,
            BLOOM_RESOLUTION: 256,
            BLOOM_INTENSITY: 0.4,
            BLOOM_THRESHOLD: 0.6,
            BLOOM_SOFT_KNEE: 0.7,
            SUNRAYS: false
        });
    </script>
</body>
</html>
